<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orange Smart Solution</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial Black', sans-serif;
            background-color: #000000;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .flyer {
            width: 90%;
            max-width: 800px;
            background-color: #000000;
            border: 15px solid #FF8C00;
            padding: 40px;
            box-sizing: border-box;
            text-align: center;
        }
        .header {
            background-color: #FF8C00;
            color: #000000;
            padding: 20px;
            font-size: clamp(30px, 5vw, 50px);
            text-transform: uppercase;
            margin-bottom: 30px;
        }
        .services {
            font-size: clamp(20px, 3vw, 32px);
            line-height: 1.6;
            margin: 40px 0;
            text-align: left;
            border-left: 8px solid #FF8C00;
            padding-left: 30px;
        }
        .highlight {
            color: #FF8C00;
        }
        .footer {
            margin-top: 50px;
            font-size: clamp(25px, 4vw, 45px);
            background-color: #FF8C00;
            color: #000000;
            padding: 15px 0;
        }
        .tagline {
            font-size: 24px;
            letter-spacing: 3px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="flyer">
        <div class="header">HANDYMAN SERVICES</div>
        
        <div class="tagline">SMART HOME & REPAIRS</div>

        <div class="services">
            • <span class="highlight">ELECTRICAL</span> SOLUTIONS<br>
            • PROFESSIONAL <span class="highlight">PLUMBING</span><br>
            • <span class="highlight">SMART HOME</span> INSTALLATION<br>
            • CUSTOM FIXTURES & SHELVING
        </div>

        <div class="footer">
            CALL IRAKLI: [შენი ნომერი]
        </div>
    </div>
</body>
</html>
